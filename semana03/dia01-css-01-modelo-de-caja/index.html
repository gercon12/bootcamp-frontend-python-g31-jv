<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Modelo de caja</title>
    <style>
        .caja {
            background-color: coral;

            width: 200px;
            height: 50px;

            border:5px solid red;
            padding: 10px; /*Espacio interno, entre el contenido y el borde*/
            margin: 10px; /*Espacio externo, despues del borde*/
            
            padding: 20px 10px 20px 10px;/*top right bottom left*/

            box-sizing: content-box;/*Valor por defecto, deja que nosotros calculemos el anccho de la caja incluyendo ancho, alto, padding, borde, margin*/
            box-sizing: border-box; /*Deja que el navegador calcule el anccho de la caja incluyendo ancho, alto, padding, borde, margin*/

        }

        .bloque {
            background-color: lightcoral;
            display: block;
            
        }
        .enlinea {
            background-color: lightgreen;
            display: inline;
        }
        .enlinea-bloque {
            background-color: lightpink;
            display:inline-block;
        }
    </style>
</head>
<body>
    <div class="caja">Modelo de caja</div>

    <!--Tipos de cajas-->
    <div class="bloque">BLOQUE</div>
    <div class="enlinea">ENLINEA1</div>
    <div class="enlinea">ENLINEA2</div>
    <div class="enlinea-bloque">ENLINEA Y BLOQUE</div>
    <span>hola span</span>
    
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Links Profile</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <main class="profile">

        <section class="card">

            <img class="card__photo"
                 src="assets/images/avatar-jessica.jpeg"
                 alt="Jessica Randall">

            <h1 class="card__name">
                Jessica Randall
            </h1>

            <p class="card__city">
                London, United Kingdom
            </p>

            <p class="card__description">
                "Front-end developer and avid reader."
            </p>

            <a href="#" class="card__button">GitHub</a>
            <a href="#" class="card__button">Frontend Mentor</a>
            <a href="#" class="card__button">LinkedIn</a>
            <a href="#" class="card__button">Twitter</a>
            <a href="#" class="card__button">Instagram</a>

        </section>

    </main>

</body>
</html>

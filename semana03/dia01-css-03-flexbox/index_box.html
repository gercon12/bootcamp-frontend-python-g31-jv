<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .contenedor {
            width: 500px;
            height: 350px;

            border: 1px solid black;
            padding: 30px;

            display: flex;
            justify-content: space-around;
        }

        .box_vertical {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .box {
            width: 80px;
            height: 80px;

            border: 1px solid lightgreen;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 40px;
        }
    </style>
</head>

<body>
    <div class="contenedor">
        <!--div.box*3-->
        <div class="box_vertical">
            <div class="box">A</div>
            <div class="box">B</div>
            <div class="box">C</div>
        </div>
        <div class="box_vertical">
            <div class="box">D</div>
            <div class="box">E</div>
            <div class="box">F</div>
        </div>
        <div class="box_vertical">
            <div class="box">G</div>
            <div class="box">H</div>
            <div class="box">I</div>
        </div>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>
</head>

<body>
    <h2>Tabla básica</h2>
    <table border>
        <tr>
            <th>Fila 1, celda 1</th>
            <th>Fila 1, celda 2</th>
            <th>Fila 1, celda 3</th>
        </tr>
        <tr>
            <td>Fila 2, celda 1</td>
            <td>Fila 2, celda 2</td>
            <td>Fila 2, celda 3</td>
        </tr>

    </table>

    <h3>Tabla avanzaa y semántica</h3>
    <table border>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Juan</td>
                <td>Perez</td>
                <td>30</td>
            </tr>

            <tr>
                <td>Maria</td>
                <td>Gonzalez</td>
                <td>25</td>
            </tr>
        <tfoot>
            <tr>
                <td>Carlos</td>
                <td>Lopez</td>
                <td>40</td>
            </tr>
            <tr>
                <td colspan="2">Total</td>
                <td>S/ 999.95</td>
            </tr>
        </tfoot>


        </tbody>
    </table>


</body>

</html>
